<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRIME Payment Received | Connect-ZA</title>
  <link rel="stylesheet" href="/styles.css?v=prime-feature">
</head>
<body class="payment-page">
  <main class="success-card">
    <div class="brand-mark">CZ</div>
    <h1>PRIME payment received</h1>
    <p id="paymentStatus">Confirming your PRIME request with Connect-ZA...</p>
    <button id="activatePayment" class="primary-btn" disabled>Confirming</button>
    <a href="/" class="link-btn">Back to Connect-ZA</a>
  </main>
  <script>
    const button = document.getElementById("activatePayment");
    const status = document.getElementById("paymentStatus");
    let processing = false;

    async function confirmPrimePayment() {
      if (processing) return;
      processing = true;
      const params = new URLSearchParams(location.search);
      button.disabled = true;
      button.textContent = "Confirming";
      try {
        const response = await fetch("/api/payments/webhook", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            businessId: params.get("businessId"),
            gateway: params.get("gateway"),
            checkoutId: params.get("checkoutId")
          })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Payment confirmation failed.");
        status.textContent = "Your PRIME request is paid and pending admin approval.";
        button.textContent = "Return to Connect-ZA";
        button.disabled = false;
      } catch (error) {
        status.textContent = error.message;
        button.textContent = "Try again";
        button.disabled = false;
      } finally {
        processing = false;
      }
    }

    button.addEventListener("click", () => {
      if (button.textContent === "Return to Connect-ZA") location.href = "/";
      else confirmPrimePayment();
    });

    confirmPrimePayment();
  </script>
</body>
</html>
