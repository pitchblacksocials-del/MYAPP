<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subscription Payment Received | Connect-ZA</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css?v=yoco-webhook-register-1">
</head>
<body class="payment-page">
  <main class="success-card">
    <img class="success-logo" src="/icons/connect-za-logo.svg" alt="Connect-ZA - Connecting Professionals" width="240" height="54">
    <h1>Subscription payment received</h1>
    <p id="paymentStatus">Confirming your subscription request with Connect-ZA...</p>
    <button id="activatePayment" class="primary-btn" disabled>Confirming</button>
    <a href="/" class="link-btn">Back to Connect-ZA</a>
  </main>
  <script>
    const button = document.getElementById("activatePayment");
    const status = document.getElementById("paymentStatus");
    let processing = false;
    let yocoPolls = 0;

    async function confirmPrimePayment() {
      if (processing) return;
      processing = true;
      const params = new URLSearchParams(location.search);
      button.disabled = true;
      button.textContent = "Confirming";
      try {
        const gateway = "Yoco";
        const reference = params.get("reference");
        const checkoutStatus = params.get("status");
        if (checkoutStatus === "cancelled") {
          status.textContent = "Yoco checkout was cancelled. No subscription payment was recorded.";
          button.textContent = "Return to Connect-ZA";
          button.disabled = false;
          return;
        }
        if (checkoutStatus === "failed") {
          status.textContent = "Yoco checkout did not complete successfully. Please try again from Connect-ZA.";
          button.textContent = "Return to Connect-ZA";
          button.disabled = false;
          return;
        }
        const response = await fetch(`/api/payments/yoco/status?reference=${encodeURIComponent(reference || "")}&checkoutId=${encodeURIComponent(params.get("checkoutId") || "")}&businessId=${encodeURIComponent(params.get("businessId") || "")}`);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Payment confirmation failed.");
        if (!data.paid) {
          status.textContent = "Yoco checkout completed. Waiting for secure payment confirmation from Yoco...";
          if (yocoPolls < 8) {
            yocoPolls += 1;
            setTimeout(confirmPrimePayment, 3000);
          } else {
            button.textContent = "Check again";
            button.disabled = false;
          }
          return;
        }
        status.textContent = "Your subscription request is paid and pending admin approval.";
        button.textContent = "Return to Connect-ZA";
        button.disabled = false;
      } catch (error) {
        status.textContent = error.message;
        button.textContent = "Try again";
        button.disabled = false;
      } finally {
        processing = false;
      }
    }

    button.addEventListener("click", () => {
      if (button.textContent === "Return to Connect-ZA") location.href = "/";
      else confirmPrimePayment();
    });

    confirmPrimePayment();
  </script>
</body>
</html>
